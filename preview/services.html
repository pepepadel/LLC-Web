<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preview — Padel4Rent Consulting (Services)</title>
  <link rel="icon" href="../assets/img/favicon-padel4rent.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/lp-style.css" rel="stylesheet">
</head>
<body>
  <div id="lp-preview-root">Loading preview…</div>

  <script>
    fetch("../pages/services.html")
      .then(function (r) { return r.text(); })
      .then(function (html) {
        document.getElementById("lp-preview-root").outerHTML = html;
        var s = document.createElement("script");
        s.src = "../assets/js/lp-script.js";
        document.body.appendChild(s);
      })
      .catch(function (err) {
        document.getElementById("lp-preview-root").textContent =
          "Could not load ../pages/services.html — make sure you are running this via a local server (see README), not by double-clicking the file.";
        console.error(err);
      });
  </script>
</body>
</html>
