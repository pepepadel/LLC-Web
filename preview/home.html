<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preview — Padel4Rent Consulting (Home)</title>
  <!-- index.html's own asset paths assume they live at the project root (no ../
       prefix), so this <base> makes every relative URL in the injected fragment
       resolve correctly even though this preview file lives one folder deeper. -->
  <base href="../">
  <link rel="icon" href="assets/img/favicon-padel4rent.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/lp-style.css" rel="stylesheet">
</head>
<body>
  <div id="lp-preview-root">Loading preview…</div>

  <script>
    // Local-preview-only loader: fetches the real fragment (../index.html)
    // and injects it here so the preview always matches production content.
    // Requires a local HTTP server (fetch() is blocked on file:// in most browsers).
    fetch("index.html")
      .then(function (r) { return r.text(); })
      .then(function (html) {
        document.getElementById("lp-preview-root").outerHTML = html;
        // The fragment's own <script src="assets/js/lp-script.js"> tag doesn't
        // execute via outerHTML injection, so load it again here explicitly.
        var s = document.createElement("script");
        s.src = "assets/js/lp-script.js";
        document.body.appendChild(s);
      })
      .catch(function (err) {
        document.getElementById("lp-preview-root").textContent =
          "Could not load index.html — make sure you are running this via a local server (see README), not by double-clicking the file.";
        console.error(err);
      });
  </script>
</body>
</html>
