<svg width="340" height="72" viewBox="0 0 340 72" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="bsLogoTitle">
  <title id="bsLogoTitle">Bluesport Consulting</title>
  <defs>
    <linearGradient id="bsGoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF6A"/>
      <stop offset="100%" stop-color="#9C7A3C"/>
    </linearGradient>
  </defs>

  <!-- Icon: abstract ascending trajectory / arc, minimal sport reference -->
  <g transform="translate(4,8)">
    <circle cx="28" cy="28" r="27" fill="#0A1F44"/>
    <path d="M12 38 L22 26 L29 32 L44 14" fill="none" stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M36 14 L44 14 L44 22" fill="none" stroke="url(#bsGoldGrad)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="12" cy="38" r="2.6" fill="url(#bsGoldGrad)"/>
  </g>

  <!-- Wordmark -->
  <text x="72" y="34" font-family="'Georgia','Times New Roman',serif" font-size="24" letter-spacing="0.5" fill="#0A1F44" font-weight="700">BLUESPORT</text>
  <text x="72" y="54" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" letter-spacing="3.5" fill="#9C7A3C">CONSULTING</text>
</svg>
